<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>情侣市场 TAM/SAM/SOM/MAU/营收 计算模型</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f7fa;--bg2:#ffffff;--bg3:#f0f2f5;
  --border:#e2e8f0;--border2:#cbd5e1;
  --text:#0f172a;--text2:#475569;--text3:#94a3b8;
  --accent:#6366f1;--violet:#8b5cf6;--cyan:#0891b2;
  --green:#059669;--emerald:#10b981;--rose:#e11d48;
  --amber:#d97706;--orange:#ea580c;
  --radius:12px;--radius-sm:8px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.07);
}
html{font-size:15px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;line-height:1.6;min-height:100vh}
#app{max-width:860px;margin:0 auto;padding:28px 16px 80px}

.header{text-align:center;margin-bottom:28px}
.header h1{font-size:clamp(1.3rem,3vw,1.7rem);font-weight:700;color:var(--text)}
.header p{color:var(--text3);font-size:.82rem;margin-top:4px}

.toolbar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:20px}
.region-tabs{display:flex;gap:4px;flex:1;flex-wrap:wrap;min-width:0}
.tab{padding:6px 14px;border-radius:20px;border:1px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;font-size:.8rem;transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:5px}
.tab:hover{border-color:var(--accent);color:var(--accent)}
.tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.tab .close{font-size:.65rem;opacity:.5;cursor:pointer;padding:2px;line-height:1}
.tab .close:hover{opacity:1}
.tab.active .close{color:#fff}
.btn{padding:6px 12px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--bg2);color:var(--text2);cursor:pointer;font-size:.78rem;transition:all .15s;white-space:nowrap}
.btn:hover{border-color:var(--accent);color:var(--accent);box-shadow:var(--shadow)}
.btn-accent{background:rgba(99,102,241,.06);border-color:rgba(99,102,241,.25);color:var(--accent)}
.btn-accent:hover{background:rgba(99,102,241,.12)}
.btn-sm{padding:3px 9px;font-size:.72rem}
.btn-danger{color:var(--rose);border-color:rgba(225,29,72,.2)}
.btn-danger:hover{background:rgba(225,29,72,.05);border-color:var(--rose)}

/* ── Funnel ── */
.funnel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px 20px 14px;margin-bottom:20px;box-shadow:var(--shadow)}
.f-row{display:flex;align-items:center;gap:10px;margin-bottom:3px}
.f-label{width:40px;font-size:.68rem;font-weight:600;color:var(--text3);text-align:right;flex-shrink:0;letter-spacing:.03em}
.f-track{flex:1;height:26px;display:flex;justify-content:flex-start}
.f-bar-wrap{height:100%;border-radius:4px;transition:width .4s cubic-bezier(.16,1,.3,1);min-width:24px;display:flex;overflow:hidden}
.f-seg{height:100%;transition:width .3s;min-width:0}
.f-seg:first-child{border-radius:4px 0 0 4px}
.f-seg:last-child{border-radius:0 4px 4px 0}
.f-seg:only-child{border-radius:4px}
.f-legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px;padding:0 2px}
.f-legend-item{display:flex;align-items:center;gap:4px;font-size:.72rem;color:var(--text2)}
.f-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.f-val{min-width:120px;font-size:.75rem;color:var(--text2);font-variant-numeric:tabular-nums;flex-shrink:0}
.f-rate{text-align:center;font-size:.65rem;color:var(--text3);padding:1px 0;line-height:1.2}
.f-rate b{color:var(--accent);font-weight:600}

/* ── 单位经济层（效率层，与规模层区分） ── */
.f-econ{margin-top:8px;padding:10px 12px;background:var(--bg3);border:1px dashed var(--border2);border-radius:var(--radius-sm);display:flex;align-items:center;gap:12px}
.f-econ-tag{font-size:.6rem;font-weight:700;letter-spacing:.05em;color:var(--text3);padding:3px 7px;background:var(--bg2);border:1px solid var(--border);border-radius:4px;flex-shrink:0;text-transform:uppercase}
.f-econ-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;flex:1;min-width:0}
.f-econ-item{display:flex;flex-direction:column;gap:2px;min-width:0}
.f-econ-label{font-size:.65rem;color:var(--text3)}
.f-econ-val{font-size:.88rem;font-weight:600;color:var(--text);font-variant-numeric:tabular-nums}
.f-econ-val.good{color:var(--green)}
.f-econ-val.warn{color:var(--amber)}
.f-econ-val.bad{color:var(--rose)}
.f-econ-sub{font-size:.62rem;line-height:1.3;margin-top:2px}
.f-econ-sub.good{color:var(--green)}
.f-econ-sub.warn{color:var(--amber)}
.f-econ-sub.bad{color:var(--rose)}
@media(max-width:600px){
  .f-econ{flex-direction:column;align-items:stretch;gap:8px}
  .f-econ-grid{grid-template-columns:repeat(2,1fr)}
}

/* ── 漏斗转换率可编辑 input + 规模/效率标签 ── */
.f-rate-tag{display:inline-block;margin-left:8px;font-size:.55rem;font-weight:700;letter-spacing:.05em;padding:2px 6px;border-radius:3px;text-transform:uppercase;vertical-align:middle}
.f-rate-tag.scale{background:rgba(99,102,241,.12);color:#6366f1;border:1px solid rgba(99,102,241,.3)}
.f-rate-tag.eff{background:rgba(16,185,129,.12);color:#059669;border:1px solid rgba(16,185,129,.3)}
.f-rate-inp{width:52px;padding:1px 4px;border:1px solid var(--border);border-radius:3px;background:transparent;color:inherit;font-weight:700;font-size:.85em;font-variant-numeric:tabular-nums;text-align:right}
.f-rate-inp.f-rate-inp-wide{width:64px}
.f-rate-inp:focus{outline:none;border-color:var(--accent,#6366f1);background:rgba(99,102,241,.06)}

/* ── 单位经济层动态提示条 ── */
.f-econ-hint{margin-top:6px;padding:8px 12px;border-radius:var(--radius-sm);font-size:.72rem;line-height:1.5;border:1px solid}
.f-econ-hint.bad{background:rgba(225,29,72,.08);border-color:rgba(225,29,72,.3);color:var(--rose)}
.f-econ-hint.warn{background:rgba(217,119,6,.08);border-color:rgba(217,119,6,.3);color:var(--amber)}
.f-econ-hint.good{background:rgba(5,150,105,.08);border-color:rgba(5,150,105,.3);color:var(--green)}
.f-econ-hint.neutral{background:var(--bg2);border-color:var(--border);color:var(--text3)}

/* ── 状态圆点（替代 emoji 徽标） ── */
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;vertical-align:middle;margin-right:6px}
.dot-green{background:#22c55e}
.dot-blue{background:#3b82f6}
.dot-yellow{background:#eab308}
.dot-red{background:#ef4444}

/* ── Card ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:4px;box-shadow:var(--shadow)}
.card-title{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.badge{font-size:.6rem;font-weight:700;letter-spacing:.04em;padding:3px 8px;border-radius:4px;color:#fff;text-transform:uppercase}
.badge.tam{background:linear-gradient(135deg,#6366f1,#818cf8)}
.badge.sam{background:linear-gradient(135deg,#8b5cf6,#a78bfa)}
.badge.som{background:linear-gradient(135deg,#0891b2,#22d3ee)}
.badge.mau{background:linear-gradient(135deg,#d97706,#f59e0b)}
.badge.rev{background:linear-gradient(135deg,#059669,#34d399)}
.card-name{font-size:.95rem;font-weight:600}

.row{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.lbl{font-size:.78rem;color:var(--text2);min-width:72px;flex-shrink:0}
.unit{font-size:.78rem;color:var(--text3);flex-shrink:0}
.inp{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);padding:6px 10px;font-size:.88rem;font-variant-numeric:tabular-nums;transition:border-color .15s,box-shadow .15s;font-family:inherit}
.inp:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.inp.sm{width:80px;text-align:right}
.inp.md{width:130px}
.inp.wide{flex:1;min-width:100px;width:100%}
.inp[type="text"]{font-size:.8rem}
.computed{color:var(--accent);font-weight:600;font-size:.92rem;font-variant-numeric:tabular-nums}
.cblock{background:rgba(99,102,241,.04);border:1px solid rgba(99,102,241,.1);border-radius:var(--radius-sm);padding:10px 14px;margin:6px 0}
.cblock.green{background:rgba(5,150,105,.04);border-color:rgba(5,150,105,.12)}
.cblock.green .computed{color:var(--green)}
.cblock.amber{background:rgba(217,119,6,.04);border-color:rgba(217,119,6,.12)}
.cblock.amber .computed{color:var(--amber)}
.formula{font-size:.72rem;color:var(--text3);font-style:italic}

.slider-row{display:flex;align-items:center;gap:10px;flex:1;min-width:160px}
input[type="range"]{-webkit-appearance:none;appearance:none;flex:1;height:5px;background:var(--border);border-radius:3px;outline:none;cursor:pointer}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;background:var(--accent);border-radius:50%;cursor:pointer;box-shadow:0 0 6px rgba(99,102,241,.25)}

.arrow{display:flex;align-items:center;justify-content:center;gap:10px;padding:10px 0;color:var(--text3)}
.arrow-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent)}
.arrow-body{display:flex;align-items:center;gap:8px;flex-shrink:0;font-size:.8rem;flex-wrap:wrap;justify-content:center}
.arrow-icon{font-size:1rem;color:var(--accent)}

/* ── Segment ── */
.seg{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:6px}
.seg-head{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.seg-name{background:transparent;border:none;border-bottom:1px dashed var(--border2);color:var(--text);font-size:.88rem;font-weight:600;padding:2px 0;flex:1;font-family:inherit}
.seg-name:focus{outline:none;border-bottom-color:var(--accent)}
.seg-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px}
.seg-field{font-size:.75rem}
.seg-field label{color:var(--text3);display:block;margin-bottom:2px}
.seg-field input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:4px;color:var(--text2);padding:4px 7px;font-size:.75rem;font-family:inherit}
.seg-field input:focus{outline:none;border-color:rgba(99,102,241,.4)}

/* ── Variables ── */
.vlist{margin-top:10px}
.vitem{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border);font-size:.75rem}
.vitem:last-child{border-bottom:none}
.vitem select{background:var(--bg2);border:1px solid var(--border);color:var(--text3);border-radius:4px;font-size:.68rem;padding:1px 2px;cursor:pointer}
.vitem .vn{flex:1;min-width:0}
.vitem .vn input,.vitem .vd input{background:transparent;border:none;border-bottom:1px dashed transparent;color:var(--text2);font-size:.75rem;width:100%;padding:1px 0;font-family:inherit}
.vitem .vd input{color:var(--text3);font-size:.72rem}
.vitem .vn input:focus,.vitem .vd input:focus{outline:none;border-bottom-color:var(--accent)}
.vitem .vd{flex:1.5;min-width:0}
.xbtn{background:none;border:none;color:var(--text3);cursor:pointer;padding:3px;font-size:.72rem;transition:color .15s;line-height:1}
.xbtn:hover{color:var(--rose)}

/* ── Revenue Hero ── */
.rev-hero{text-align:center;padding:18px 16px;background:linear-gradient(135deg,rgba(5,150,105,.06),rgba(16,185,129,.03));border:1px solid rgba(5,150,105,.15);border-radius:var(--radius);margin:8px 0}
.rev-hero .big{font-size:1.6rem;font-weight:700;color:var(--green);font-variant-numeric:tabular-nums;line-height:1.2}
.rev-hero .sub{font-size:.75rem;color:var(--text3);margin-top:2px}

/* ── Summary ── */
.stable{width:100%;border-collapse:separate;border-spacing:0;font-size:.8rem}
.stable th{color:var(--text3);font-weight:500;text-align:left;padding:7px 10px;border-bottom:2px solid var(--border)}
.stable td{padding:7px 10px;border-bottom:1px solid var(--border);font-variant-numeric:tabular-nums}
.stable tr:last-child td{border-bottom:none;font-weight:700;color:var(--accent)}
.stable .n{text-align:right}

/* 决策面板 4 档色卡 */
.decision-board{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:16px;box-shadow:var(--shadow)}
.db-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:10px}
.db-col{padding:12px;border-radius:var(--radius-sm);border:1px solid var(--border)}
.db-col.recommend{background:rgba(5,150,105,.06);border-color:rgba(5,150,105,.25)}
.db-col.strategic{background:rgba(59,130,246,.06);border-color:rgba(59,130,246,.25)}
.db-col.leverage{background:rgba(217,119,6,.06);border-color:rgba(217,119,6,.25)}
.db-col.skip{background:rgba(220,38,38,.04);border-color:rgba(220,38,38,.2)}
.db-head{font-weight:700;font-size:.82rem;margin-bottom:6px;display:flex;align-items:center;gap:4px}
.db-desc{font-size:.7rem;color:var(--text3);margin-bottom:8px}
.db-item{display:flex;justify-content:space-between;font-size:.78rem;padding:3px 0;border-bottom:1px dashed var(--border)}
.db-item:last-child{border-bottom:none}
.db-score{font-variant-numeric:tabular-nums;color:var(--text3)}

/* 战略推荐卡片 */
.advisor-medal{display:flex;align-items:flex-start;gap:12px;padding:14px;border-radius:var(--radius-sm);margin-bottom:10px;background:var(--bg3);border-left:4px solid var(--accent)}
.advisor-medal.gold{border-left-color:#fbbf24}
.advisor-medal.silver{border-left-color:#94a3b8}
.advisor-medal.bronze{border-left-color:#d97706}
.advisor-rank{font-size:1.4rem;flex-shrink:0}
.advisor-body{flex:1;min-width:0;font-size:.82rem}
.advisor-name{font-weight:700;font-size:.95rem;margin-bottom:4px}
.advisor-scores{font-size:.72rem;color:var(--text3);margin-bottom:6px;font-variant-numeric:tabular-nums}
.advisor-play{color:var(--accent);font-weight:600;margin-bottom:4px}
.advisor-tip{color:var(--text2);padding:2px 0}
.advisor-risk{color:var(--rose);font-size:.72rem;margin-top:4px}
.advisor-block{padding:12px 14px;border-radius:var(--radius-sm);margin:10px 0;font-size:.82rem}
.advisor-block.strategic-hold{background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.2)}
.advisor-block.leverage-hold{background:rgba(217,119,6,.04);border:1px solid rgba(217,119,6,.15)}
.advisor-block.skip-hold{background:rgba(220,38,38,.03);border:1px solid rgba(220,38,38,.12)}
.advisor-block-title{font-weight:700;margin-bottom:6px}
.advisor-budget{padding:12px 14px;background:rgba(99,102,241,.04);border:1px dashed rgba(99,102,241,.2);border-radius:var(--radius-sm);margin-top:10px;font-size:.78rem}
.advisor-budget-title{font-weight:700;color:var(--accent);margin-bottom:6px}
.advisor-budget-item{padding:2px 0;color:var(--text2)}
.eu-warn{color:#ea580c;font-weight:600}

/* 策略矩阵 */
.matrix-table{width:100%;border-collapse:separate;border-spacing:0;font-size:.78rem}
.matrix-table th{color:var(--text3);font-weight:500;text-align:center;padding:8px 10px;border-bottom:2px solid var(--border);background:var(--bg3)}
.matrix-table th:first-child{text-align:left}
.matrix-table td{padding:8px 10px;border-bottom:1px solid var(--border);font-variant-numeric:tabular-nums;text-align:center}
.matrix-table td:first-child{text-align:left;font-weight:500}
.matrix-table td.three-all{font-weight:700}
.matrix-cell-green{background:rgba(5,150,105,.1);color:var(--green)}
.matrix-cell-amber{background:rgba(217,119,6,.1);color:var(--amber)}
.matrix-cell-red{background:rgba(220,38,38,.08);color:var(--rose)}

/* 移动端响应 */
@media(max-width:640px){
  .db-grid{grid-template-columns:1fr}
  .advisor-medal{flex-direction:column}
  .matrix-table{min-width:520px}
  .stable,.matrix-table{font-size:.72rem}
  .card:has(.matrix-table){overflow-x:auto}
}

.sources{margin-top:20px;padding:14px 18px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);font-size:.72rem;color:var(--text3);box-shadow:var(--shadow)}
.sources h3{font-size:.78rem;color:var(--text2);margin-bottom:6px;font-weight:600}
.sources ul{list-style:none;padding:0}
.sources li{padding:2px 0 2px 12px;position:relative}
.sources li::before{content:"·";position:absolute;left:0;color:var(--accent)}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bg2);border:1px solid var(--border);color:var(--accent);padding:8px 18px;border-radius:8px;font-size:.8rem;box-shadow:var(--shadow-md);transition:transform .25s ease;z-index:100}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ── Dropdown ── */
.dd-wrap{position:relative;display:inline-block}
.dd-menu{display:none;position:absolute;top:100%;left:0;margin-top:4px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-sm);box-shadow:var(--shadow-md);z-index:50;min-width:190px;padding:4px;max-height:340px;overflow-y:auto}
.dd-menu.open{display:block}
.dd-item{padding:7px 12px;font-size:.8rem;cursor:pointer;border-radius:4px;transition:background .1s;white-space:nowrap}
.dd-item:hover{background:var(--bg3);color:var(--accent)}
.dd-sep{height:1px;background:var(--border);margin:4px 8px}

@media(max-width:600px){
  #app{padding:16px 8px 60px}
  .card{padding:12px 10px}
  .row{flex-direction:column;align-items:stretch;gap:5px}
  .lbl{min-width:auto}
  .inp.sm{width:100%;text-align:left}
  .slider-row{min-width:0}
  .seg-grid{grid-template-columns:1fr}
  .f-val{min-width:80px;font-size:.68rem}
  .f-label{width:30px;font-size:.6rem}
  .rev-hero .big{font-size:1.2rem}
}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<script>
// ===== DATA =====
function defaultChina() {
  return {
    id:'china', name:'中国',
    tam:{ population:3.8, description:'18-35岁适龄人口（七普口径推算至2026，1985-2002年出生段自然衰减）', source:'国家统计局第七次人口普查（2020）+ 年度推算' },
    tamToSamRate:45,
    samToSomRate:20,
    segments:[
      {id:'s1',name:'异地恋情侣',rate:30,painPoint:'缺乏陪伴感、安全感',features:'实时状态同步、虚拟约会、倒计时'},
      {id:'s2',name:'大学生情侣',rate:20,painPoint:'共同成长、异地毕业分离',features:'情侣日记、学习打卡、未来规划'},
      {id:'s3',name:'职场新人情侣',rate:35,painPoint:'时间少、压力大',features:'快速互动、减压游戏、周末约会推荐'},
      {id:'s4',name:'其他情侣',rate:15,painPoint:'多样化',features:'通用功能'}
    ],
    penetrationRate:2, payingRate:5, arppu:40,
    cpi:10, installToMauRate:30, organicRate:50, avgLifetimeMonths:8,
    tamVars:[
      {id:'v1',name:'人口出生率',trend:'down',detail:'逐年下降，18-35岁存量逐年缩减'},
      {id:'v2',name:'人口年龄结构',trend:'down',detail:'85-02年出生人口从高峰2500万/年降至1600万/年'}
    ],
    samVars:[
      {id:'v3',name:'恋爱意愿下降',trend:'down',detail:'51.8%大学生认为婚姻不重要'},
      {id:'v4',name:'经济门槛',trend:'down',detail:'月入<2k者30.5%不愿结婚'},

// ===== UTILS =====
function fp(yi){
  if(yi>=1)return yi.toFixed(2).replace(/\.?0+$/,'')+'亿';
  const w=yi*10000;
  if(w>=1)return w.toFixed(1).replace(/\.?0+$/,'')+'万';
  if(w>0)return w.toFixed(2).replace(/\.?0+$/,'')+'万';
  return '0';
}
function fpr(yiPairs){
  if(yiPairs>=1)return yiPairs.toFixed(2).replace(/\.?0+$/,'')+'亿对';
  const w=yiPairs*10000;
  if(w>=0.1)return w.toFixed(1).replace(/\.?0+$/,'')+'万对';
  if(w>0)return w.toFixed(2).replace(/\.?0+$/,'')+'万对';
  return '0对';
}
function fm(wan){
  if(wan>=10000)return(wan/10000).toFixed(2).replace(/\.?0+$/,'')+'亿元';
  if(wan>=1)return wan.toFixed(1).replace(/\.?0+$/,'')+'万元';
  if(wan>0)return(wan*10000).toFixed(0)+'元';
  return '0元';
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
const RCOLORS=['#6366f1','#ec4899','#f59e0b','#10b981','#3b82f6','#8b5cf6','#ef4444','#06b6d4','#f97316','#84cc16'];
function regionColor(i){return RCOLORS[i%RCOLORS.length]}

function calc(r){
  const tamPop=r.tam.population||0;
  const samPop=tamPop*r.tamToSamRate/100;
  const samPairs=samPop/2;
  const somTotal=samPairs*(r.samToSomRate||0)/100;
  const segs=r.segments.map(s=>{const p=somTotal*s.rate/100;return{...s,pairs:p}});
  const somRate=r.samToSomRate||0;
  const mauPairs=somTotal*(r.penetrationRate||0)/100;
  const mauPop=mauPairs*2;
  const payPairs=mauPairs*(r.payingRate||0)/100;
  const mrrW=payPairs*10000*(r.arppu||0);
  const arrW=mrrW*12;
  // 获客经济学：假设每对 MAU 需 1 个 paid install（另一半通过邀请），扣除 organic 后
  const cpi=r.cpi||0;
  const i2m=(r.installToMauRate||30)/100;
  const org=(r.organicRate||0)/100;
  const paidInstalls=i2m>0?mauPairs*(1-org)/i2m:0;
  const adSpendW=paidInstalls*cpi/10000;
  const ltv=(r.arppu||0)*(r.avgLifetimeMonths||0);
  const cac=payPairs>0?adSpendW*10000/payPairs:0;
  const ltvCac=cac>0?ltv/cac:0;
  const payback=(r.arppu||0)>0?cac/(r.arppu||0):0;
  // 市场得分：LTV/CAC 50% + 回本期 25% + SOM 规模 15% + ARR 10%
  const s1=Math.min(100,(ltvCac/3)*100);
  const s2=payback>0?Math.max(0,100-payback*6):0;
  const s3=Math.min(100,somTotal/0.2*100);
  const s4=Math.min(100,arrW/5000*100);
  const score=Math.round(s1*0.5+s2*0.25+s3*0.15+s4*0.1);
  return{tamPop,samPop,samPairs,segs,somTotal,somRate,mauPairs,mauPop,payPairs,mrrW,arrW,cpi,paidInstalls,adSpendW,ltv,cac,ltvCac,payback,score};
}
// ===== STRATEGY UTILS =====
function calcFeasibility(r){
  // 5 维难度打分（每维 1-5，越高越难），加权总分范围 5-25
  // 映射到 0-100 可行性指数：越高越容易落地
  const f=r.feasibility||{};
  const totalWeighted=
    (f.compliance||0)*1.5+
    (f.localization||0)+
    (f.competition||0)+
    (f.channel||0)+
    (f.operation||0)*0.5;
  const score=(25-totalWeighted)/20*100;
  return Math.max(0,Math.min(100,score));
}

function simulateStrategy(region,keys){
  const r=JSON.parse(JSON.stringify(region));
  if(keys.includes('viral'))r.organicRate=Math.max(r.organicRate||0,70);
  if(keys.includes('retention'))r.avgLifetimeMonths=(r.avgLifetimeMonths||0)*2;
  if(keys.includes('pricing'))r.arppu=(r.arppu||0)*1.3;
  return calc(r);
}

function calcOverallScore(r){
  const c=calc(r);
  const econ=Math.min(100,Math.max(0,(c.ltvCac/2)*50+Math.min(50,c.arrW/100)));
  const feas=calcFeasibility(r);
  const strat=(r.strategicValue?.score||3)*20;
  // 综合价值得分：经济 30% + 可行性 30% + 战略 40%
  return Math.round(econ*0.3+feas*0.3+strat*0.4);
}

function classifyRegion(r){
  if(r.strategicValue?.mode==='retain')return 'strategic';
  const c=calc(r);
  if(c.ltvCac>=1.0&&c.payback<=(r.avgLifetimeMonths||1))return 'recommend';
  const three=simulateStrategy(r,['viral','retention','pricing']);
  if(three.ltvCac>=1.5)return 'leverage';
  return 'skip';
}

function findMinStrategy(r){
  const all=['viral','retention','pricing'];
  const combos=[[],['viral'],['retention'],['pricing'],['viral','retention'],['viral','pricing'],['retention','pricing'],all];
  for(const c of combos){
    const res=c.length===0?calc(r):simulateStrategy(r,c);
    if(res.ltvCac>=1.5)return{combo:c,result:res};
  }
  return{combo:all,result:simulateStrategy(r,all)};
}

function rFunnel(){
  const multi=state.regions.length>1;
  // Aggregate all regions
  const aggs=state.regions.map((r,i)=>({r,c:calc(r),color:regionColor(i)}));
  let tTam=0,tSam=0,tSamP=0,tSom=0,tMauP=0,tMauPop=0,tPayP=0,tMrr=0,tArr=0;
  aggs.forEach(a=>{tTam+=a.c.tamPop;tSam+=a.c.samPop;tSamP+=a.c.samPairs;tSom+=a.c.somTotal;tMauP+=a.c.mauPairs;tMauPop+=a.c.mauPop;tPayP+=a.c.payPairs;tMrr+=a.c.mrrW;tArr+=a.c.arrW});

  // Single region → relative scale (TAM fills ~90%, funnel looks normal)
  // Multi-region → absolute scale against global 15亿 reference
  const GLOBAL_REF=15;
  const ref=multi?Math.max(GLOBAL_REF,tTam*1.1):Math.max(tTam*1.15,0.001);
  const layerGrads=['linear-gradient(90deg,#6366f1,#818cf8)','linear-gradient(90deg,#8b5cf6,#a78bfa)','linear-gradient(90deg,#0891b2,#22d3ee)','linear-gradient(90deg,#d97706,#f59e0b)','linear-gradient(90deg,#059669,#34d399)'];
  const labels=['TAM','SAM','SOM','MAU','营收'];
  const pops=[tTam,tSam,tSom*2,tMauPop,tPayP*2];
  const perR=[aggs.map(a=>a.c.tamPop),aggs.map(a=>a.c.samPop),aggs.map(a=>a.c.somTotal*2),aggs.map(a=>a.c.mauPop),aggs.map(a=>a.c.payPairs*2)];
  const vals=[
    fp(tTam)+'人',
    fp(tSam)+'人 | '+fpr(tSamP),
    fpr(tSom),
    fpr(tMauP)+' | '+fp(tMauPop)+'人',
    'ARR '+fm(tArr)+'/年'
  ];
  // Aggregated conversion rates
  const samR=tTam>0?(tSam/tTam*100).toFixed(1):'0';
  const somR=tSamP>0?(tSom/tSamP*100).toFixed(1):'0';
  const penR=tSom>0?(tMauP/tSom*100).toFixed(1):'0';
  const payRt=tMauP>0?(tPayP/tMauP*100).toFixed(1):'0';
  const effArppu=tPayP>0?(tMrr/(tPayP*10000)).toFixed(0):'0';
  // Single region: rates become inline-editable inputs bound to the active region.
  // Multi-region: show aggregated read-only values. Both show scale/efficiency tags.
  const ar0=multi?null:state.regions.find(rg=>rg.id===state.activeRegionId);
  const fInp=(act,uid,step,val)=>`<input class="f-rate-inp" type="number" min="0" max="100" step="${step}" value="${val}" data-action="${act}" data-uid="${uid}">`;
  const rateVal=(fallbackAgg,liveVal,act,uid,step)=>multi?`<b>${fallbackAgg}%</b>`:`${fInp(act,uid,step,liveVal)}%`;
  const tagScale='<span class="f-rate-tag scale">规模</span>';
  const tagEff='<span class="f-rate-tag eff">效率</span>';
  const arppuInp=multi?`¥${effArppu}`:`¥<input class="f-rate-inp f-rate-inp-wide" type="number" min="0" step="1" value="${ar0?.arppu||0}" data-action="arppu" data-uid="arppu_f">`;
  const rates=[
    `↓ ${rateVal(samR,ar0?ar0.tamToSamRate:0,'conv','conv_f',1)} 恋爱/已婚${tagScale}`,
    `↓ ${rateVal(somR,ar0?(ar0.samToSomRate||0):0,'s2sr','s2sr_f',0.5)} 场景覆盖${tagScale}`,
    `↓ ${rateVal(penR,ar0?(ar0.penetrationRate||0):0,'penr','penr_f',0.5)} 渗透${tagScale}`,
    `↓ ${rateVal(payRt,ar0?(ar0.payingRate||0):0,'payr','payr_f',0.5)} 付费 × ${arppuInp}/月${tagEff}`
  ];
  const mins=[3,3,3,2,2];

  let h='<div class="funnel">';
  // Legend when multiple regions
  if(multi){
    h+='<div class="f-legend">';
    state.regions.forEach((r,i)=>{h+=`<span class="f-legend-item"><span class="f-dot" style="background:${regionColor(i)}"></span>${esc(r.name)}</span>`});
    h+=`<span class="f-legend-item" style="color:var(--text3);font-size:.65rem;margin-left:auto">${state.regions.length} 区域汇总</span>`;
    h+='</div>';
  }
  for(let i=0;i<5;i++){
    // Linear absolute scale: bars grow when regions are added
    const rawPct=pops[i]/ref;
    const w=Math.max(mins[i],rawPct*100);
    let segsH;
    if(multi){
      segsH=perR[i].map((v,j)=>{const pct=pops[i]>0?(v/pops[i]*100):0;return pct>0?`<div class="f-seg" style="width:${pct.toFixed(2)}%;background:${aggs[j].color}" title="${esc(state.regions[j].name)}"></div>`:''}).join('');
    }else{
      segsH=`<div class="f-seg" style="width:100%;background:${layerGrads[i]}"></div>`;
    }
    h+=`<div class="f-row"><span class="f-label">${labels[i]}</span><div class="f-track"><div class="f-bar-wrap" style="width:${w.toFixed(1)}%">${segsH}</div></div><span class="f-val">${vals[i]}</span></div>`;
    if(i<4)h+=`<div class="f-rate">${rates[i]}</div>`;
  }

  // ── 单位经济层（效率层） ──
  let tPaid=0,tAdW=0,wLtv=0,wCac=0,wCpi=0,tPaidInstalls=0,wLt=0;
  aggs.forEach(a=>{
    const pp=a.c.payPairs;
    tPaid+=a.c.paidInstalls;
    tAdW+=a.c.adSpendW;
    wLtv+=(a.c.ltv||0)*pp;
    wCac+=(a.c.cac||0)*pp;
    wLt+=(a.r.avgLifetimeMonths||0)*pp;
    const pi=a.c.paidInstalls||0;
    wCpi+=(a.r.cpi||0)*pi;
    tPaidInstalls+=pi;
  });
  const aggPay=aggs.reduce((s,a)=>s+a.c.payPairs,0);
  const aggArppu=aggs.reduce((s,a)=>s+(a.r.arppu||0)*a.c.payPairs,0);
  const ltvAgg=aggPay>0?wLtv/aggPay:0;
  const cacAgg=aggPay>0?wCac/aggPay:0;
  const arppuAgg=aggPay>0?aggArppu/aggPay:0;
  const ltvCacAgg=cacAgg>0?ltvAgg/cacAgg:0;
  const paybackAgg=arppuAgg>0?cacAgg/arppuAgg:0;
  const ltAgg=aggPay>0?wLt/aggPay:0;
  const econCls=aggPay<=0?'':ltvCacAgg>=3?'good':ltvCacAgg>=1?'warn':'bad';
  const pbCls=paybackAgg<=0?'':paybackAgg<=12?'good':paybackAgg<=24?'warn':'bad';
  const cacStr=cacAgg<1?'—':Math.round(cacAgg).toString();
  const pbStr=paybackAgg<1?'—':paybackAgg.toFixed(1);
  let pbSubCls='',pbSubTxt='';
  if(aggPay>0&&ltAgg>0&&paybackAgg>0){
    const ltStr=ltAgg.toFixed(1);
    if(paybackAgg<ltAgg*0.5){pbSubCls='good';pbSubTxt=`&lt; 生命周期 ${ltStr}月的一半，健康`;}
    else if(paybackAgg<ltAgg){pbSubCls='warn';pbSubTxt=`接近生命周期 ${ltStr}月，临界`;}
    else{pbSubCls='bad';pbSubTxt=`&gt; 生命周期 ${ltStr}月，用户还没回本就流失`;}
  }
  // CPI aggregation: single region uses its cpi directly; multi uses paidInstalls-weighted mean
  const cpiVal=multi?(tPaidInstalls>0?Math.round(wCpi/tPaidInstalls):0):Math.round(ar0?.cpi||0);
  h+=`<div class="f-econ">
    <span class="f-econ-tag">单位经济</span>
    <div class="f-econ-grid">
      <div class="f-econ-item"><span class="f-econ-label">CPI 安装成本</span><span class="f-econ-val">¥${cpiVal} / install</span></div>
      <div class="f-econ-item"><span class="f-econ-label">获付费用户成本</span><span class="f-econ-val ${econCls}">¥${cacStr} / 付费对</span></div>
      <div class="f-econ-item"><span class="f-econ-label">LTV/CAC</span><span class="f-econ-val ${econCls}">${ltvCacAgg.toFixed(2)}</span></div>
      <div class="f-econ-item"><span class="f-econ-label">付费对回本期</span><span class="f-econ-val ${pbCls}">${pbStr} 月</span>${pbSubTxt?`<span class="f-econ-sub ${pbSubCls}">${pbSubTxt}</span>`:''}</div>
    </div>
  </div>`;
  // ── 动态提示条 ──
  let hintCls,hintTxt;
  if(aggPay<=0){
    hintCls='neutral';
    hintTxt='暂无付费对数据。先确认付费率和 MAU 规模。';
  } else if(ltvCacAgg<1){
    hintCls='bad';
    hintTxt=`当前 LTV/CAC ${ltvCacAgg.toFixed(2)} &lt; 1，亏损状态。优先提升效率杠杆（有机占比/付费率/生命周期），提升规模参数（渗透率/SOM 率）只会放大亏损。`;
  } else if(ltvCacAgg<3){
    hintCls='warn';
    hintTxt=`当前 LTV/CAC ${ltvCacAgg.toFixed(2)}，临界状态。再推效率杠杆到 LTV/CAC ≥ 3 可健康放大规模。`;
  } else {
    hintCls='good';
    hintTxt=`当前 LTV/CAC ${ltvCacAgg.toFixed(2)}，效率健康。可通过提升规模杠杆（渗透率/SOM 率/SAM 率）放大利润。`;
  }
  h+=`<div class="f-econ-hint ${hintCls}">${hintTxt}</div>`;
  h+='</div>';
  return h;
}

function rVars(vars,layer){
  const items=vars.map(v=>
    `<div class="vitem">
      <select data-action="vtrend" data-layer="${layer}" data-vid="${v.id}">
        <option value="up"${v.trend==='up'?' selected':''}>↑</option>
        <option value="down"${v.trend==='down'?' selected':''}>↓</option>
        <option value="neutral"${v.trend==='neutral'?' selected':''}>→</option>
      </select>
      <div class="vn"><input type="text" value="${esc(v.name)}" data-action="vname" data-layer="${layer}" data-vid="${v.id}" data-uid="vn_${v.id}"></div>
      <div class="vd"><input type="text" value="${esc(v.detail)}" data-action="vdetail" data-layer="${layer}" data-vid="${v.id}" data-uid="vd_${v.id}"></div>
      <button class="xbtn" data-action="vrm" data-layer="${layer}" data-vid="${v.id}">&times;</button>

}

function rDecisionBoard(){
  if(state.regions.length<2)return '';
  const buckets={recommend:[],strategic:[],leverage:[],skip:[]};
  state.regions.forEach(r=>{
    const cls=classifyRegion(r);
    const os=calcOverallScore(r);
    buckets[cls].push({r,os});
  });
  Object.values(buckets).forEach(b=>b.sort((a,z)=>z.os-a.os));
  const cols=[
    {key:'recommend',dot:'dot-green',label:'推荐投',desc:'L/C≥1.0 且回本期可接受',color:'recommend'},
    {key:'strategic',dot:'dot-blue',label:'战略保留',desc:'非经济驱动，品牌/声量价值',color:'strategic'},
    {key:'leverage',dot:'dot-yellow',label:'策略可撬动',desc:'三管齐下后 L/C≥1.5',color:'leverage'},
    {key:'skip',dot:'dot-red',label:'不建议投',desc:'当前参数下难以盈利',color:'skip'}
  ];
  let h='<div class="decision-board"><div class="card-title"><span class="card-name">市场决策信号灯</span></div><div class="db-grid">';
  cols.forEach(col=>{
    h+=`<div class="db-col ${col.color}">`;
    h+=`<div class="db-head"><span class="dot ${col.dot}"></span>${col.label}</div>`;
    h+=`<div class="db-desc">${col.desc}</div>`;
    const items=buckets[col.key];
    if(items.length===0){
      h+='<div class="db-item" style="color:var(--text3);font-size:.72rem">—</div>';
    } else {
      items.forEach(({r,os})=>{
        h+=`<div class="db-item"><span>${esc(r.name)}</span><span class="db-score">${os}</span></div>`;
      });
    }
    h+='</div>';
  });
  h+='</div></div>';
  return h;
}

function rStrategyAdvisor(){
  if(state.regions.length<2)return '';
  const classified=state.regions.map(r=>({r,cls:classifyRegion(r),os:calcOverallScore(r)}));
  const recommends=classified.filter(x=>x.cls==='recommend').sort((a,b)=>b.os-a.os);
  const strategics=classified.filter(x=>x.cls==='strategic').sort((a,b)=>b.os-a.os);
  const leverages=classified.filter(x=>x.cls==='leverage').sort((a,b)=>b.os-a.os);
  const skips=classified.filter(x=>x.cls==='skip').sort((a,b)=>b.os-a.os);

  // Top 3: fill from recommend, then strategic
  const top3=[...recommends,...strategics].slice(0,3);
  const medals=['gold','silver','bronze'];
  const medalIcons=['TOP1','TOP2','TOP3'];

  let h='<div class="card" style="margin-bottom:16px"><div class="card-title"><span class="card-name">战略地图（按综合价值排序）</span></div>';

  // Top 3 medals
  top3.forEach(({r,os,cls},idx)=>{
    const c=calc(r);
    const econScore=Math.min(100,Math.max(0,(c.ltvCac/2)*50+Math.min(50,c.arrW/100)));
    const feasScore=calcFeasibility(r);
    const stratScore=(r.strategicValue?.score||3)*20;
    const {combo,result}=findMinStrategy(r);
    const comboLabel=combo.length===0?'现状已达标':combo.map(k=>STRATEGY_LABELS[k]||k).join(' + ');
    const tips=(STRATEGY_TIPS[r.id]||[]).slice(0,3);
    const risks=(r.feasibility?.risks||[]).slice(0,2);
    const clsLabel=cls==='strategic'?'战略保留':'推荐投';
    h+=`<div class="advisor-medal ${medals[idx]}">
      <div class="advisor-rank">${medalIcons[idx]}</div>
      <div class="advisor-body">
        <div class="advisor-name">${esc(r.name)} <span style="font-size:.72rem;font-weight:400;color:var(--text3)">${clsLabel}</span></div>
        <div class="advisor-scores">经济${Math.round(econScore)} / 可行${Math.round(feasScore)} / 战略${Math.round(stratScore)}</div>
        <div class="advisor-play">最佳打法：${esc(comboLabel)}</div>
        <div style="font-size:.72rem;color:var(--text3);margin-bottom:4px">L/C ${c.ltvCac.toFixed(2)} → 撬动后 ${result.ltvCac.toFixed(2)} ｜ ARR ${fm(c.arrW)} → ${fm(result.arrW)}/年</div>
        ${tips.map(t=>`<div class="advisor-tip">${esc(t)}</div>`).join('')}
        ${risks.map(t=>`<div class="advisor-risk">${esc(t)}</div>`).join('')}
      </div>
    </div>`;
  });

  // Strategic hold block
  if(strategics.length>0){
    h+='<div class="advisor-block strategic-hold"><div class="advisor-block-title"><span class="dot dot-blue"></span>战略保留区域</div>';
    strategics.forEach(({r,os})=>{
      const reasons=(r.strategicValue?.reasons||[]).join('、');
      const tips=(STRATEGY_TIPS[r.id]||[]).slice(0,3);
      const risks=(r.feasibility?.risks||[]).slice(0,2);
      h+=`<div style="margin-bottom:8px">
        <span style="font-weight:600">${esc(r.name)}</span> <span class="db-score">综合${os}</span>
        <span style="color:var(--text3);font-size:.72rem;margin-left:8px">${esc(reasons)}</span>
        ${tips.map(t=>`<div class="advisor-tip">${esc(t)}</div>`).join('')}
        ${risks.map(t=>`<div class="advisor-risk">${esc(t)}</div>`).join('')}
      </div>`;
    });
    h+='</div>';
  }

  // Leverage block
  if(leverages.length>0){
    h+='<div class="advisor-block leverage-hold"><div class="advisor-block-title"><span class="dot dot-yellow"></span>策略可撬动但需谨慎</div>';
    leverages.forEach(({r,os})=>{
      const {combo,result}=findMinStrategy(r);
      const comboLabel=combo.map(k=>STRATEGY_LABELS[k]||k).join('+');
      const risk0=(r.feasibility?.risks||[])[0]||'';
      const isEu=r.id==='eu';
      h+=`<div style="margin-bottom:6px;font-size:.78rem">
        <span style="font-weight:600">${esc(r.name)}</span> · ${esc(comboLabel||'三管齐下')} · 综合${os}
        ${isEu?`<span class="eu-warn"> · ${esc(risk0)}</span>`:(risk0?`<span style="color:var(--text3)"> · ${esc(risk0)}</span>`:'')}
      </div>`;
    });
    h+='</div>';
  }

  // Skip block
  if(skips.length>0){
    h+='<div class="advisor-block skip-hold"><div class="advisor-block-title"><span class="dot dot-red"></span>暂不建议投</div>';
    skips.forEach(({r,os})=>{
      const three=simulateStrategy(r,['viral','retention','pricing']);
      h+=`<div style="font-size:.78rem;margin-bottom:4px">
        <span style="font-weight:600">${esc(r.name)}</span> · 综合${os} · 三管齐下 L/C ${three.ltvCac.toFixed(2)}
      </div>`;
    });
    h+='</div>';
  }

  // Budget tiers
  h+=`<div class="advisor-budget">
    <div class="advisor-budget-title">按预算分档的组合建议</div>
    <div class="advisor-budget-item"><strong>Seed/A 轮 (&lt;$1M)</strong>：单押北美 + 中国象征性维持（月费 &lt;¥50 万）</div>
    <div class="advisor-budget-item"><strong>A+/B 轮 ($1-3M)</strong>：北美 + 日韩 + 中国（经济 + 声量平衡）</div>
    <div class="advisor-budget-item"><strong>B+/C 轮 (&gt;$3M)</strong>：加拉美做增量 / 观察欧洲合规窗口（Year 2）</div>
  </div>`;

  h+='</div>';
  return h;
}

function rStrategyMatrix(){
  if(state.regions.length<2)return '';
  const strategies=[
    {key:[],label:'当前'},
    {key:['viral'],label:'+病毒增长'},
    {key:['retention'],label:'+长留存'},
    {key:['pricing'],label:'+涨价 30%'},
    {key:['viral','retention','pricing'],label:'三管齐下'}
  ];
  function cellClass(v){
    if(v>=1.5)return 'matrix-cell-green';
    if(v>=1.0)return 'matrix-cell-amber';
    return 'matrix-cell-red';
  }
  let h='<div class="card" style="margin-top:4px"><div class="card-title"><span class="card-name">策略杠杆对比矩阵</span></div>';
  h+='<div style="overflow-x:auto"><table class="matrix-table"><thead><tr>';
  h+='<th>区域</th>';
  strategies.forEach((s,i)=>{
    h+=`<th${i===strategies.length-1?' style="font-weight:700"':''}>${esc(s.label)}</th>`;
  });
  h+='</tr></thead><tbody>';
  state.regions.forEach(r=>{
    h+=`<tr><td>${esc(r.name)}</td>`;
    strategies.forEach((s,i)=>{
      const res=s.key.length===0?calc(r):simulateStrategy(r,s.key);
      const v=res.ltvCac;
      const cls=cellClass(v)+(i===strategies.length-1?' three-all':'');
      h+=`<td class="${cls}">${v.toFixed(2)}</td>`;
    });
    h+='</tr>';
  });
  h+='</tbody></table></div></div>';
  return h;
}

function rSummary(){
  if(state.regions.length<2)return '';
  let tt=0,ts=0,to=0,tm=0,ta=0;
  const rows=state.regions.map(r=>({r,c:calc(r)}));
  // 按得分排序，追加排名
  const ranked=[...rows].sort((a,b)=>b.c.score-a.c.score);
  const rank=new Map();ranked.forEach((x,i)=>rank.set(x.r.id,i+1));
  const rowsH=rows.map(({r,c})=>{
    tt+=c.tamPop;ts+=c.samPop;to+=c.somTotal;tm+=c.mauPairs;ta+=c.arrW;
    const healthColor=c.ltvCac>=3?'var(--green)':c.ltvCac>=1?'var(--amber)':'var(--rose)';
    const rk=rank.get(r.id);
    const rkBadge=rk===1?'TOP1':rk===2?'TOP2':rk===3?'TOP3':`#${rk}`;
    return `<tr><td>${rkBadge} ${esc(r.name)}</td><td class="n">${fpr(c.somTotal)}</td><td class="n">¥${c.cpi}</td><td class="n">¥${c.cac<1?'—':c.cac.toFixed(0)}</td><td class="n">¥${c.ltv.toFixed(0)}</td><td class="n" style="color:${healthColor};font-weight:600">${c.ltvCac.toFixed(2)}</td><td class="n">${c.payback<1?'—':c.payback.toFixed(1)+'月'}</td><td class="n">${fm(c.arrW)}/年</td><td class="n" style="font-weight:700;color:var(--accent)">${c.score}</td></tr>`;
  }).join('');
  return `<div class="card" style="margin-top:16px"><div class="card-title"><span class="card-name">多区域市场健康度对比（按得分排名）</span></div>
    <div style="overflow-x:auto"><table class="stable"><thead><tr><th>区域</th><th class="n">SOM</th><th class="n">CPI</th><th class="n">CAC</th><th class="n">LTV</th><th class="n">LTV/CAC</th><th class="n">回本期</th><th class="n">ARR</th><th class="n">得分</th></tr></thead>
    <tbody>${rowsH}</tbody></table></div>
    <div style="font-size:.7rem;color:var(--text3);margin-top:8px">LTV/CAC ≥3 <span class="dot dot-green"></span>健康 · 1-3 <span class="dot dot-yellow"></span>临界 · &lt;1 <span class="dot dot-red"></span>亏损 ｜ 回本期 ≤12月 <span class="dot dot-green"></span> · 12-24月 <span class="dot dot-yellow"></span> · &gt;24月 <span class="dot dot-red"></span></div></div>`;
}

function rSources(){
  return `<div class="sources"><h3>数据来源参考 & 基准说明</h3><ul>
    <li>人口：国家统计局第七次人口普查（2020）· UN WPP 2024 · Eurostat · US Census · Statistics Japan/KOSIS 2024</li>
    <li>恋爱意愿：中科院心理所《国民心理健康发展报告 2023-2024》· Pew Research "Dating and Relationships 2023" · 日本 IPSS《出生動向基本調査 2021》</li>
    <li>CPI 基准：AppsFlyer《Performance Index 2024》· Liftoff《Mobile Ad Trends Report 2024》· data.ai《State of Mobile 2024》— 中国¥10-25、印度¥3-10、东南亚¥7-15、北美¥25-60、欧洲¥25-50、日韩¥40-80、拉美¥5-15</li>
    <li>次月留存：行业平均约会/社交类 25-38%（Adjust《Mobile App Trends 2024》）</li>
    <li>付费率基准：Tinder 5-8%（Match Group 财报公开）· Bumble 7-10%（Bumble Inc. 财报）· 探探/Soul/Pairs/Between 3-15%（业内推测，非官方披露）</li>
    <li>有机占比：情侣产品 K因子天然偏高（双向邀请机制），40-60% 合理</li>
    <li>渗透率、生命周期为产品假设值，需上线后 3-6 个月实际数据校准</li>
    <li style="color:var(--text3);font-size:.75rem;margin-top:8px;border-top:1px dashed var(--border);padding-top:8px">披露：宏观人口和上市公司财报数据为权威公开来源；CPI / 留存来自第三方归因平台行业报告区间估算；非公开披露公司（探探/Soul/Pairs/Between）付费率为业内推测，仅作方向性参考。所有假设以实际投放数据为准。</li></ul></div>`;
}

// ===== EVENTS =====
let _bound=false;
function bind(){
  if(_bound)return;
  _bound=true;
  const app=document.getElementById('app');
  app.addEventListener('input',onInput);
  app.addEventListener('click',onClick);
  app.addEventListener('change',onChange);
}

function syncSlider(action,sid,val){
  const pairs={convs:'conv',conv:'convs',penrs:'penr',penr:'penrs',payrs:'payr',payr:'payrs',segrs:'segr',segr:'segrs',s2srs:'s2sr',s2sr:'s2srs'};
  const other=pairs[action];if(!other)return;
  const sel=sid?`[data-action="${other}"][data-sid="${sid}"]`:`[data-action="${other}"]`;
  document.querySelectorAll(sel).forEach(el=>{el.value=val});
}

function onInput(e){
  const el=e.target,a=el.dataset.action,r=ar();if(!a||!r)return;

  if(a==='tampop'){r.tam.population=parseFloat(el.value)||0}
  else if(a==='tamdesc'){r.tam.description=el.value;saveState();return}
  else if(a==='tamsrc'){r.tam.source=el.value;saveState();return}
  else if(a==='rname'){r.name=el.value}
  else if(a==='conv'||a==='convs'){r.tamToSamRate=Math.max(0,Math.min(100,parseFloat(el.value)||0));syncSlider(a,null,r.tamToSamRate)}
  else if(a==='s2sr'||a==='s2srs'){r.samToSomRate=Math.max(0,Math.min(100,parseFloat(el.value)||0));syncSlider(a,null,r.samToSomRate)}
  else if(a==='penr'||a==='penrs'){r.penetrationRate=Math.max(0,Math.min(100,parseFloat(el.value)||0));syncSlider(a,null,r.penetrationRate)}
  else if(a==='payr'||a==='payrs'){r.payingRate=Math.max(0,Math.min(100,parseFloat(el.value)||0));syncSlider(a,null,r.payingRate)}
  else if(a==='arppu'){r.arppu=Math.max(0,parseFloat(el.value)||0)}
  else if(a==='cpi'){r.cpi=Math.max(0,parseFloat(el.value)||0)}
  else if(a==='i2m'){r.installToMauRate=Math.max(0,Math.min(100,parseFloat(el.value)||0))}
  else if(a==='org'){r.organicRate=Math.max(0,Math.min(100,parseFloat(el.value)||0))}
  else if(a==='lt'){r.avgLifetimeMonths=Math.max(1,parseFloat(el.value)||0)}
  else if(a==='segr'||a==='segrs'){const s=r.segments.find(x=>x.id===el.dataset.sid);if(s){s.rate=Math.max(0,Math.min(100,parseFloat(el.value)||0));syncSlider(a,s.id,s.rate)}}
  else if(a==='segname'){const s=r.segments.find(x=>x.id===el.dataset.sid);if(s){s.name=el.value;saveState();return}}
  else if(a==='segpain'){const s=r.segments.find(x=>x.id===el.dataset.sid);if(s){s.painPoint=el.value;saveState();return}}
  else if(a==='segfeat'){const s=r.segments.find(x=>x.id===el.dataset.sid);if(s){s.features=el.value;saveState();return}}
  else if(a==='vname'){const v=fv(r,el.dataset.layer,el.dataset.vid);if(v){v.name=el.value;saveState();return}}
  else if(a==='vdetail'){const v=fv(r,el.dataset.layer,el.dataset.vid);if(v){v.detail=el.value;saveState();return}}
  else return;
  render();
}

function onChange(e){
  const el=e.target;
  if(el.dataset.action==='vtrend'){const r=ar(),v=fv(r,el.dataset.layer,el.dataset.vid);if(v){v.trend=el.value;saveState()}}
}

function onClick(e){
  const el=e.target.closest('[data-action]');if(!el)return;
  const a=el.dataset.action;
  if(a==='sw-region'){state.activeRegionId=el.dataset.id;render()}
  else if(a==='rm-region'){e.stopPropagation();if(state.regions.length<=1)return;state.regions=state.regions.filter(r=>r.id!==el.dataset.id);if(state.activeRegionId===el.dataset.id)state.activeRegionId=state.regions[0].id;render();toast('已删除区域')}
  else if(a==='toggle-presets'){const m=document.getElementById('presetMenu');m.classList.toggle('open');const cl=ev=>{if(!el.parentElement.contains(ev.target)){m.classList.remove('open');document.removeEventListener('click',cl)}};setTimeout(()=>document.addEventListener('click',cl),0)}
  else if(a==='add-preset'){const p=PRESETS.find(x=>x.key===el.dataset.key);let nr;if(p&&p.gen){nr=p.gen();nr.id=gid();nr.segments.forEach(s=>s.id=gid());['tamVars','samVars','somVars','mauVars','revVars'].forEach(k=>(nr[k]||[]).forEach(v=>v.id=gid()))}else{nr={id:gid(),name:'新区域',tam:{population:0,description:'',source:''},tamToSamRate:40,samToSomRate:20,segments:[],penetrationRate:2,payingRate:4,arppu:40,cpi:15,installToMauRate:30,organicRate:50,avgLifetimeMonths:8,tamVars:[],samVars:[],somVars:[],mauVars:[],revVars:[]};}{const base=nr.name;let n=2;while(state.regions.some(r=>r.name===nr.name)){nr.name=base+' ('+n+')';n++}}state.regions.push(nr);state.activeRegionId=nr.id;document.getElementById('presetMenu')?.classList.remove('open');render();toast('已添加: '+nr.name)}
  else if(a==='dup-region'){const src=ar(),id=gid(),d=JSON.parse(JSON.stringify(src));d.id=id;d.name=src.name+' (副本)';d.segments.forEach(s=>s.id=gid());['tamVars','samVars','somVars','mauVars','revVars'].forEach(k=>(d[k]||[]).forEach(v=>v.id=gid()));state.regions.push(d);state.activeRegionId=id;render();toast('已复制区域')}
  else if(a==='segadd'){ar().segments.push({id:gid(),name:'新场景',rate:10,painPoint:'',features:''});render()}
  else if(a==='segrm'){const r=ar();r.segments=r.segments.filter(s=>s.id!==el.dataset.sid);render()}
  else if(a==='vadd'){const r=ar(),l=el.dataset.layer;if(r[l]){r[l].push({id:gid(),name:'新变量',trend:'neutral',detail:''});render()}}
  else if(a==='vrm'){const r=ar(),l=el.dataset.layer;if(r[l]){r[l]=r[l].filter(v=>v.id!==el.dataset.vid);render()}}
  else if(a==='export'){doExport()}
  else if(a==='reset'){if(confirm('确定要重置所有数据为默认值？')){state={v:SV,regions:[defaultChina()],activeRegionId:'china'};render();toast('已重置')}}
}

function fv(r,layer,vid){return r[layer]?.find(v=>v.id===vid)}

// ===== EXPORT =====
function doExport(){
  let t='═══ 情侣市场 TAM/SAM/SOM/MAU/营收 模型 ═══\n\n';
  state.regions.forEach(r=>{
    const c=calc(r);
    t+=`【${r.name}】\n`;
    t+=`TAM（总体适龄市场）: ${fp(c.tamPop)}人\n  ${r.tam.description}\n  来源: ${r.tam.source}\n\n`;
    t+=`TAM → SAM 转化率: ${r.tamToSamRate}%\n`;
    t+=`SAM（可服务市场）: ${fp(c.samPop)}人 | ${fpr(c.samPairs)}\n`;
    t+=`SAM → SOM 意愿+触达率: ${r.samToSomRate}%\n`;
    t+=`SOM（可获得市场）: ${fpr(c.somTotal)}\n`;
    t+=`  场景结构:\n`;
    c.segs.forEach(s=>{t+=`    · ${s.name}: ${s.rate}% → ${fpr(s.pairs)}\n`});
    t+=`\nSOM → MAU 渗透率: ${r.penetrationRate}%\n`;
    t+=`MAU（月活）: ${fpr(c.mauPairs)} | ${fp(c.mauPop)}人\n`;
    t+=`付费率: ${r.payingRate}%  |  ARPPU: ¥${r.arppu}/月/对\n`;
    t+=`付费对数: ${fpr(c.payPairs)}\n`;
    t+=`MRR: ${fm(c.mrrW)}/月  |  ARR: ${fm(c.arrW)}/年\n\n`;
    t+=`─ 获客经济学 ─\n`;
    t+=`CPI: ¥${r.cpi}/install  |  Install→MAU: ${r.installToMauRate}%  |  有机占比: ${r.organicRate}%\n`;
    t+=`LTV: ¥${c.ltv.toFixed(0)}/付费对 (生命周期 ${r.avgLifetimeMonths}个月)\n`;
    t+=`CAC: ¥${c.cac.toFixed(0)}/付费对\n`;
    t+=`LTV/CAC: ${c.ltvCac.toFixed(2)}  |  回本期: ${c.payback.toFixed(1)}月\n`;
    t+=`年买量预算: ${(c.adSpendW*12<=0||classifyRegion(r)==='strategic')?'/':fm(c.adSpendW*12)+'/年'}\n`;
    t+=`市场得分: ${c.score}/100\n\n`;
  });
  if(state.regions.length>1){
    let tt=0,ts=0,to=0,tm=0,ta=0;
    state.regions.forEach(r=>{const c=calc(r);tt+=c.tamPop;ts+=c.samPop;to+=c.somTotal;tm+=c.mauPairs;ta+=c.arrW});
    t+=`【汇总】\n总TAM: ${fp(tt)}人\n总SAM: ${fp(ts)}人\n总SOM: ${fpr(to)}\n总MAU: ${fpr(tm)}\n总ARR: ${fm(ta)}/年\n`;
  }
  navigator.clipboard.writeText(t).then(()=>toast('已复制到剪贴板')).catch(()=>{const w=window.open('','_blank');w.document.write('<pre>'+t.replace(/</g,'&lt;')+'</pre>')});
}

// ===== INIT =====
render();
</script>
